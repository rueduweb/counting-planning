<div class="overflow-x-auto">
  <div
    class="flex flex-col gap-4
          md:flex-row
          md:justify-between
          md:items-center
          mb-6"
  >

    <h1 class="text-white text-2xl md:text-3xl font-bold">
      Planning estival du comptage
    </h1>

      <button
        (click)="openModal()"
        class="
          w-full
          md:w-auto
          bg-taupe-800
          text-white
          px-4
          py-2
          rounded-lg
          hover:bg-taupe-700
          transition
        "
      >
        Ajouter mes dates
      </button>

    </div>

    <div class="grid
      grid-cols-1
      md:grid-cols-2
      xl:grid-cols-3
      gap-4
      md:gap-6"
    >

      @for(month of months(); track month.label){

        <div class="bg-white shadow-sm rounded-xl p-4">

          <h2 class="text-lg
            md:text-xl
            font-bold
            mb-4
            capitalize">
            {{ month.label }}
          </h2>

          @for(day of month.dates; track day){

            @let people = getPeopleForDate(day);

            <app-attendance-card
              [date]="day"
              [people]="people"
              [displayedCount]="people.length"
              (selectedPeople)="openModifyForm($event)"
            />

          }
        </div>
      }
  </div>
</div>

@if(showModal()){

<div
  class="fixed inset-0 bg-black/50 flex items-center justify-center"
>

  <div class="bg-white p-2 rounded-xl w-[380px]">

    <app-planning-form
      (closed)="closeModal()"
    />

  </div>

</div>

}

@if(showModifyForm()){
  <app-planning-modify-form
    [person]="selectedPerson!"
    (closed)="showModifyForm.set(false)"
  />
}
