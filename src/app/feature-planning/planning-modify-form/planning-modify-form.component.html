<!-- OVERLAY -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-3 sm:p-6">
  <!-- MODAL -->
  <div class="w-full max-w-2xl bg-white rounded-xl shadow-xl">

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="flex flex-col gap-6 p-4 sm:p-6">

      <!-- ================= TITLE ================= -->

      <label class="text-center text-sm sm:text-base text-taupe-700 font-medium">
        Modifier vos dates de service
      </label>

      <hr>

      <!-- ================= NAME ================= -->

      <div class="w-full">

        <label class="block text-sm font-medium mb-1">
          Nom
        </label>

        <mat-form-field class="w-full">

          <mat-label>Nom</mat-label>

          <input
            matInput
            formControlName="name"
            readonly>

        </mat-form-field>

      </div>

      <!-- ================= DATE + ADD ================= -->

      <div class="flex flex-col sm:flex-row gap-3 sm:items-center">

        <mat-form-field class="w-full sm:flex-1">

          <mat-label>Date</mat-label>

          <input
            matInput
            [matDatepickerFilter]="dateFilter"
            [matDatepicker]="picker"
            formControlName="selectedDate">

          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>

          <mat-datepicker #picker></mat-datepicker>

        </mat-form-field>

        <!-- ADD BUTTON -->

        <button
          type="button"
          (click)="addDate()"
          class="w-full sm:w-14 sm:h-14 h-12 rounded bg-taupe-500 text-white text-xl hover:bg-taupe-700 transition"
          >
          +
        </button>

      </div>

      <!-- ================= DATES ================= -->

      <div>

        <h2 class="text-center text-sm sm:text-base font-bold mb-3">
          Dates sélectionnées
        </h2>

        <div class="space-y-2">

          @for(control of dates.controls; track $index){

            <!-- CARD DATE -->
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">

              <!-- DATE DISPLAY -->
              <div class="flex-1 border rounded-lg bg-white px-2 py-3 text-sm text-center sm:text-left">

                {{ control.value | date:'dd/MM/yyyy' }}

              </div>

              <!-- DELETE BUTTON -->
              <button
                mat-mini-fab
                aria-label="supprimer cette date"
                (click)="removeDate($index)">
                <mat-icon>close</mat-icon>
              </button>

            </div>

          }

        </div>

      </div>

      <!-- ================= ACTIONS ================= -->

      <div class="flex flex-col sm:flex-row justify-end gap-3 pt-2">

        <button
          type="button"
          (click)="cancel()"
          class="w-full cursor-pointer sm:w-auto border rounded-lg px-4 py-2">
          Cancel
        </button>

        <button
          type="submit"
          [disabled]="form.invalid || dates.length === 0"
          class="w-full cursor-pointer sm:w-auto bg-green-600 text-white rounded-lg px-5 py-2 disabled:bg-gray-400">
          Modify
        </button>

      </div>
    </form>

  </div>

</div>
